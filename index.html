<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        #chat { flex: 1; overflow-y: scroll; padding: 20px; }
        .bubble { background: white; padding: 10px 15px; border-radius: 20px; margin-bottom: 10px; max-width: 80%; display: inline-block; }
        .yellow { color: #f1c40f; font-weight: bold; }
        #loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="login-screen">
    <input id="isim" placeholder="İsmini yaz..." style="padding:10px; margin-bottom:10px;">
    <button onclick="girisYap()">Giriş Yap</button>
    <div id="loader"></div>
</div>

<div id="chat-screen">
    <div id="users" style="padding:10px; background:#ddd;">Aktifler: <span id="userList"></span></div>
    <div id="chat"></div>
    <div id="typing" style="padding:5px; color:gray; font-size:12px;"></div>
    <input id="mesaj" placeholder="Mesajını yaz..." style="padding:15px;" onkeypress="if(event.key==='Enter') gonder()">
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myName = "";

    function girisYap() {
        myName = document.getElementById('isim').value;
        if (!myName) return;
        document.getElementById('loader').style.display = 'block';
        setTimeout(() => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            socket.emit('login', myName);
        }, 2000);
    }

    const input = document.getElementById('mesaj');
    input.addEventListener('input', () => socket.emit('typing', true));
    input.addEventListener('blur', () => socket.emit('typing', false));

    function gonder() {
        const mesaj = input.value;
        if (!mesaj) return;
        let renk = (mesaj === "Asvbnajknsğfkasğsf") ? "yellow" : "black";
        socket.emit('chat message', { mesaj, renk });
        input.value = '';
        socket.emit('typing', false);
    }

    socket.on('chat message', (data) => {
        const prefix = (data.isim === 'PAPALES90') ? '[Yönetici] ' : '';
        const chat = document.getElementById('chat');
        chat.innerHTML += `<div class="bubble ${data.renk}"><b>${prefix}${data.isim}:</b> ${data.mesaj} <small style="display:block; font-size:9px;">${data.zaman}</small></div>`;
        chat.scrollTop = chat.scrollHeight;
    });

    socket.on('updateUserList', (users) => document.getElementById('userList').innerText = users.join(', '));
    socket.on('userTyping', (data) => document.getElementById('typing').innerText = data.isTyping ? `${data.name} yazıyor...` : '');
</script>
</body>
</html>
