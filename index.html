<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohbet</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; }
        #chat { height: 300px; border: 1px solid #ccc; overflow-y: scroll; margin-bottom: 10px; padding: 10px; }
        input { width: 100%; padding: 10px; margin-bottom: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; }
    </style>
</head>
<body>

    <div id="login">
        <input type="text" id="isim" placeholder="İsminizi girin...">
        <button onclick="girisYap()">Sohbete Başla</button>
    </div>

    <div id="app" style="display:none;">
        <div id="chat"></div>
        <input type="text" id="mesaj" placeholder="Mesaj yaz...">
        <button onclick="mesajGonder()">Gönder</button>
    </div>

    <script>
        const socket = io();
        let isim = "";

        function girisYap() {
            isim = document.getElementById('isim').value;
            if (isim) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            } else {
                alert("Lütfen bir isim yaz!");
            }
        }

        function mesajGonder() {
            const mesaj = document.getElementById('mesaj').value;
            if(mesaj) {
                socket.emit('mesaj', { isim: isim, mesaj: mesaj });
                document.getElementById('mesaj').value = '';
            }
        }

        socket.on('mesaj', (data) => {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div><b>${data.isim}:</b> ${data.mesaj} <small>(${data.zaman})</small></div>`;
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
