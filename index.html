<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #2a9d8f; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #login { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: white; }
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: scroll; padding: 20px; }
        
        .bubble { background: white; padding: 12px; border-radius: 15px; margin: 10px 0; width: 70%; position: relative; }
        
        /* Özel Stiller */
        .admin-tag { color: red; font-weight: bold; }
        .special-msg { border: 3px solid #ffcc00; background-color: #fff9c4 !important; }
        
        /* Bildirim Butonu */
        .btn-notify { background: #e9c46a; padding: 10px 20px; border-radius: 10px; border: none; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login">
        <h1>Sohbet Odası</h1>
        <input id="name" placeholder="İsminiz...">
        <button onclick="start()" style="padding: 10px 20px;">Giriş Yap</button>
        <!-- Bildirim butonu -->
        <button class="btn-notify" onclick="askNotificationPermission()">Bildirimleri Aç</button>
    </div>

    <div id="chat-area">
        <div id="messages"></div>
        <div style="display: flex; padding: 10px;">
            <input id="msg" style="flex:1" placeholder="Mesaj yaz..." onkeydown="handleEnter(event)">
            <button onclick="send()">Gönder</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var myName = "";

        // Bildirim İzin İsteme
        function askNotificationPermission() {
            if (!("Notification" in window)) {
                alert("Tarayıcınız bildirimleri desteklemiyor.");
            } else {
                Notification.requestPermission().then(function (permission) {
                    if (permission === "granted") {
                        alert("Tamamdır! Bildirimler açık.");
                    }
                });
            }
        }

        function start() {
            myName = document.getElementById('name').value;
            if(myName === "") return;
            socket.emit('login', myName);
            document.getElementById('login').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        }

        function send() {
            var input = document.getElementById('msg');
            if(input.value === "") return;
            socket.emit('chat', {msg: input.value});
            input.value = "";
        }

        function handleEnter(e) { if (e.keyCode === 13) send(); }

        // Tarihçe Yükleme
        socket.on('init', function(history) {
            for(var i=0; i<history.length; i++) { addMessage(history[i]); }
        });

        // Yeni Mesaj
        socket.on('chat', function(data) { 
            addMessage(data); 
            
            // Eğer bildirim izni varsa ve sayfa aktif değilse bildirim göster
            if (Notification.permission === "granted") {
                new Notification(data.user + " yeni mesaj gönderdi:", {
                    body: data.msg
                });
            }
        });

        function addMessage(data) {
            var messages = document.getElementById('messages');
            var div = document.createElement('div');
            
            // 1. Yönetici Kontrolü
            var adminClass = (data.user === 'PAPALES90') ? 'admin-tag' : '';
            var adminLabel = (data.user === 'PAPALES90') ? '[Yönetici] ' : '';

            // 2. Özel Kelime Kontrolü (Sarı Çerçeve)
            var isSpecial = data.msg.toLowerCase().includes('asvbnajknsğfkasğsf');
            div.className = 'bubble ' + (isSpecial ? 'special-msg' : '');

            div.innerHTML = '<span class="'+adminClass+'">'+adminLabel+'</span>' + 
                            "<b>" + data.user + "</b>: " + data.msg + 
                            "<sub style='display:block; font-size:9px; color:#888;'>" + data.time + "</sub>";
            
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
