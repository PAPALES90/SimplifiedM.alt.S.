<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #2a9d8f; font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #login { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: white; }
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: scroll; padding: 20px; }
        /* Baloncuklar */
        .bubble { background: white; padding: 12px; border-radius: 15px; margin: 10px 0; width: 70%; position: relative; }
        .my-bubble { background: #d4edda; align-self: flex-end; margin-left: auto; } /* Senin mesajların yeşil */
        .admin { color: #e76f51; font-weight: bold; }
        input { padding: 15px; border-radius: 25px; border: none; margin: 10px; }
        button { padding: 15px 30px; border-radius: 25px; border: none; background: #264653; color: white; }
        img { max-width: 100%; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="login">
        <h1>Sohbet Odası</h1>
        <input id="name" placeholder="İsminiz...">
        <button onclick="start()">Giriş Yap</button>
    </div>

    <div id="chat-area">
        <div id="messages"></div>
        <div style="display: flex; padding: 10px; background: #f0f0f0;">
            <input id="msg" style="flex:1" placeholder="Mesaj..." onkeydown="handleEnter(event)">
            <input type="file" id="fileInput" style="display:none" onchange="sendImage(this)">
            <button onclick="document.getElementById('fileInput').click()">📷</button>
            <button onclick="send()">Gönder</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var bildirimSesi = new Audio('https://actions.google.com/sounds/v1/notifications/beep_short.ogg');
        
        // İsmi otomatik hatırla
        window.onload = function() {
            var savedName = localStorage.getItem('chatName');
            if(savedName) {
                document.getElementById('name').value = savedName;
            }
        };

        function start() {
            var name = document.getElementById('name').value;
            if(name === "") return;
            localStorage.setItem('chatName', name); // İsmi kaydet
            socket.emit('login', name);
            document.getElementById('login').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        }

        function send() {
            var input = document.getElementById('msg');
            if(input.value === "") return;
            socket.emit('chat', {msg: input.value, type: 'text'});
            input.value = "";
        }

        // Resim gönderme
        function sendImage(input) {
            var file = input.files[0];
            var reader = new FileReader();
            reader.onload = function(e) {
                socket.emit('chat', {msg: e.target.result, type: 'image'});
            };
            reader.readAsDataURL(file);
        }

        socket.on('chat', function(data) {
            var messages = document.getElementById('messages');
            var div = document.createElement('div');
            var isMine = (data.user === localStorage.getItem('chatName'));
            
            div.className = 'bubble ' + (isMine ? 'my-bubble' : '');
            
            var content = (data.type === 'image') ? '<img src="'+data.msg+'">' : data.msg;
            div.innerHTML = "<b>" + data.user + "</b>: " + content + 
                            "<sub style='display:block; font-size:9px; color:#888;'>"+data.time+" • Görüldü✓</sub>";
            
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            bildirimSesi.play();
        });

        function handleEnter(e) { if (e.keyCode === 13) send(); }
    </script>
</body>
</html>
