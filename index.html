<!DOCTYPE html>
<html>
<body>
    <div id="sohbet" style="height:200px; border:1px solid #ccc; overflow-y:scroll;"></div>
    <input id="girdi" type="text">
    <button onclick="gonder()">Gonder</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        function gonder() {
            var input = document.getElementById('girdi');
            socket.emit('mesaj', input.value);
            input.value = '';
        }
        socket.on('mesaj', function(msg){
            var kutu = document.getElementById('sohbet');
            kutu.innerHTML += '<p>' + msg + '</p>';
            kutu.scrollTop = kutu.scrollHeight;
        });
    </script>
</body>
</html>
