<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        body { font-family: sans-serif; background: #eee; margin: 0; }
        #login { position:fixed; top:0; width:100%; height:100%; background:#008069; display:flex; justify-content:center; align-items:center; }
        #chat-ui { display:none; flex-direction:column; height:100vh; background:white; }
        #chat { flex:1; overflow-y:auto; padding:10px; border-bottom:1px solid #ccc; }
        .msg { padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div id="login">
        <div style="background:white; padding:20px; border-radius:10px;">
            <input id="isim" placeholder="Adın ne?">
            <button onclick="giris()">Giriş</button>
        </div>
    </div>
    <div id="chat-ui">
        <div id="chat"></div>
        <div style="padding:10px; display:flex;">
            <input id="mesaj" style="flex:1;">
            <button onclick="gonder()">Gönder</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
    <script>
        var socket = io();
        function giris() {
            var isim = document.getElementById('isim').value;
            if(isim) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('chat-ui').style.display = 'flex';
                socket.emit('yeni-kullanici', isim);
                window.kullanici = isim;
            }
        }
        function gonder() {
            var msg = document.getElementById('mesaj').value;
            socket.emit('mesaj', {kimden: window.kullanici, icerik: msg});
            document.getElementById('mesaj').value = '';
        }
        socket.on('mesaj', function(data) {
            var div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = '<strong>' + data.kimden + ':</strong> ' + data.icerik;
            document.getElementById('chat').appendChild(div);
        });
    </script>
</body>
</html>
