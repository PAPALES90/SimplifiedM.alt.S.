<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; background: #2a9d8f; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #login { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: white; }
        #chat { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; }
        .bubble { background: white; padding: 10px; border-radius: 15px; margin: 5px; max-width: 80%; word-wrap: break-word; }
        .input-area { display: flex; padding: 10px; background: #fff; }
        input { flex: 1; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 15px 20px; background: #264653; color: white; border: none; border-radius: 5px; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="login">
        <h2>Sohbet Odası</h2>
        <input id="n" placeholder="İsminiz...">
        <button onclick="login()" style="width: 200px; margin-top: 10px;">Giriş Yap</button>
    </div>

    <div id="chat">
        <div id="messages"></div>
        <div class="input-area">
            <input id="m" autocomplete="off" placeholder="Mesaj yaz...">
            <button onclick="send()">Gönder</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var name = "";

        function login() {
            name = document.getElementById('n').value;
            if(!name) return;
            document.getElementById('login').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
            socket.emit('login', name);
        }

        function send() {
            var msg = document.getElementById('m').value;
            if(!msg) return;
            socket.emit('chat', {user: name, msg: msg});
            document.getElementById('m').value = '';
        }

        socket.on('chat', function(data) {
            var msgs = document.getElementById('messages');
            var div = document.createElement('div');
            div.className = 'bubble';
            div.innerHTML = '<b>' + data.user + ':</b> ' + data.msg;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        });
    </script>
</body>
</html>
