<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #2a9d8f; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #login { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: white; }
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; }
        .bubble { background: white; padding: 12px 18px; border-radius: 20px; margin: 10px 0; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: fit-content; max-width: 75%; }
        .admin { color: #e76f51; font-weight: bold; }
        input { padding: 15px; border-radius: 25px; border: none; margin: 10px; }
        button { padding: 15px 30px; border-radius: 25px; border: none; background: #264653; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login">
        <h1>Sohbet Odası</h1>
        <input id="name" placeholder="İsminiz...">
        <button onclick="start()">Giriş Yap</button>
    </div>

    <div id="chat-area">
        <div id="messages"></div>
        <div style="display: flex;">
            <input id="msg" style="flex:1" placeholder="Mesaj yaz...">
            <button onclick="send()">Gönder</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        function start() {
            const name = document.getElementById('name').value;
            if(!name) return;
            socket.emit('login', name);
            document.getElementById('login').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        }
        function send() {
            const msg = document.getElementById('msg').value;
            if(!msg) return;
            socket.emit('chat', msg);
            document.getElementById('msg').value = '';
        }
        socket.on('chat', (data) => {
            const div = document.createElement('div');
            div.className = 'bubble';
            const adminTag = (data.user === 'PAPALES90') ? '<span class="admin">[Yönetici]</span> ' : '';
            div.innerHTML = `${adminTag} <b>${data.user}</b>: ${data.msg} <sub style="display:block; font-size:10px; color:#888;">${data.time}</sub>`;
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView();
        });
    </script>
</body>
</html>
