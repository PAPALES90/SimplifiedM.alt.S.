<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background-color: #dcdcdc; font-family: Arial, sans-serif; margin: 0; padding: 10px; }
        #login-screen { text-align: center; margin-top: 50px; }
        #chat-screen { display: none; }
        #messages { height: 300px; overflow-y: scroll; border: 1px solid #ccc; background: white; padding: 10px; margin-bottom: 10px; }
        .bubble { background-color: #007aff; color: white; padding: 8px 12px; border-radius: 15px; margin-bottom: 10px; width: fit-content; max-width: 80%; }
        .admin { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <input id="isim" placeholder="Isminizi girin...">
        <button onclick="giris()">Giris Yap</button>
    </div>

    <div id="chat-screen">
        <div id="messages"></div>
        <input id="input" style="width: 70%;">
        <button onclick="gonder()">Gonder</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var name = "";

        function giris() {
            name = document.getElementById('isim').value;
            if(name) {
                socket.emit('login', name);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'block';
            }
        }

        function gonder() {
            var input = document.getElementById('input');
            if(input.value) {
                socket.emit('chat message', input.value);
                input.value = '';
            }
        }

        socket.on('chat message', function(data) {
            var messages = document.getElementById('messages');
            var div = document.createElement('div');
            div.className = 'bubble';
            
            var prefix = "";
            if(data.isim === 'PAPALES90') {
                prefix = '<span class="admin">[Yönetici] </span>';
            }
            
            div.innerHTML = prefix + '<b>' + data.isim + ':</b> ' + data.mesaj;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        });
    </script>
</body>
</html>
