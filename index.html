<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #2a9d8f; font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #login { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: white; }
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: scroll; padding: 20px; }
        .bubble { background: white; padding: 12px; border-radius: 20px; margin: 10px 0; width: 70%; }
        .admin { color: #e76f51; font-weight: bold; }
        input { padding: 15px; border-radius: 25px; border: none; margin: 10px; }
        button { padding: 15px 30px; border-radius: 25px; border: none; background: #264653; color: white; }
    </style>
</head>
<body>

    <div id="login">
        <h1>Sohbet Odası</h1>
        <input id="name" placeholder="İsminiz...">
        <button onclick="start()">Giriş Yap</button>
    </div>

    <div id="chat-area">
        <div id="messages"></div>
        <div style="display: flex;">
            <input id="msg" style="flex:1" placeholder="Mesaj yaz...">
            <button onclick="send()">Gönder</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var myName = "";

        function start() {
            myName = document.getElementById('name').value;
            if(myName === "") return;
            socket.emit('login', myName);
            document.getElementById('login').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        }

        function send() {
            var input = document.getElementById('msg');
            if(input.value === "") return;
            socket.emit('chat', input.value);
            input.value = "";
        }

        socket.on('chat', function(data) {
            var messages = document.getElementById('messages');
            var div = document.createElement('div');
            div.className = 'bubble';
            
            var adminTag = "";
            if (data.user === 'PAPALES90') {
                adminTag = '<span class="admin">[Yönetici]</span> ';
            }
            
            div.innerHTML = adminTag + "<b>" + data.user + "</b>: " + data.msg + 
                            "<sub style='display:block; font-size:10px; color:#888;'>" + data.time + "</sub>";
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        });
    </script>
</body>
</html>
